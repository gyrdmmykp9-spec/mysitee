<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz! ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 1.2rem;
        }
        .heart {
            font-size: 50px;
            color: #ff4d6d;
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤️</div>
        <h1>Sitemize Hoş Geldin!</h1>
        <p>Senin için çok güzel bir sürpriz hazırlıyorum... 🥰</p>
    </div>
</body>
</html>
